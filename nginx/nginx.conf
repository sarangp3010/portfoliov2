worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_comp_level 6;

    # ── Upstream apps ──────────────────────────────────────────────────────
    upstream app_public {
        server app-public:80;
    }

    upstream app_admin {
        server app-admin:80;
    }

    upstream app_customer {
        server app-customer:80;
    }

    upstream api_server {
        server server:5000;
    }

    # ── public.example.com → public website ───────────────────────────────
    server {
        listen 80;
        server_name public.localhost public.* ~^public\.;

        location / {
            proxy_pass http://app_public;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # ── admin.example.com → admin dashboard ───────────────────────────────
    server {
        listen 80;
        server_name admin.localhost admin.* ~^admin\.;

        location / {
            proxy_pass http://app_admin;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # ── customer.example.com → customer portal ─────────────────────────────
    server {
        listen 80;
        server_name customer.localhost customer.* ~^customer\.;

        location / {
            proxy_pass http://app_customer;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # ── api.example.com → API server ──────────────────────────────────────
    server {
        listen 80;
        server_name api.localhost api.* ~^api\.;

        location / {
            proxy_pass http://api_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
            client_max_body_size 50M;
        }
    }

    # ── Default: route localhost → public site ─────────────────────────────
    server {
        listen 80 default_server;
        server_name _;

        # Route /api/* to server
        location /api/ {
            proxy_pass http://api_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
            client_max_body_size 50M;
        }

        # Everything else → public site
        location / {
            proxy_pass http://app_public;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
